<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Study Manager</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Pretendard', sans-serif; }
        .app-container { max-width: 500px; margin: 0 auto; background: white; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .tab-content { flex: 1; overflow: hidden; }
        #sentenceList { height: calc(100vh - 110px); overflow-y: auto; padding: 10px; }
        .sentence-item { 
            background: #fff; border: 1px solid #eee; border-radius: 10px; 
            margin-bottom: 10px; padding: 15px; cursor: pointer; transition: 0.2s;
        }
        .sentence-item:active { background-color: #f8f9fa; transform: scale(0.98); }
        .importance-star { color: #ffc107; font-weight: bold; }
        .is-memorized { color: #ccc; text-decoration: line-through; }
        .loading-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(255,255,255,0.8); display: none; align-items: center; 
            justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>

<div class="app-container shadow-sm">
    <div id="loading" class="loading-overlay"><div class="spinner-border text-primary"></div></div>

    <!-- 탭 메뉴 -->
    <ul class="nav nav-pills nav-fill bg-light p-2" id="studyTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#practice">연습</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#sentences" onclick="fetchData()">문장</button></li>
    </ul>

    <div class="tab-content">
        <!-- 연습 탭 -->
        <div class="tab-pane fade show active p-4 text-center" id="practice">
            <h4 class="mt-5">오늘의 복습</h4>
            <p class="text-muted">문장 탭에서 데이터를 관리하세요.</p>
        </div>

        <!-- 문장 탭 -->
        <div class="tab-pane fade h-100" id="sentences">
            <div class="p-3 d-flex justify-content-between align-items-center bg-white border-bottom">
                <h6 class="fw-bold m-0">문장 리스트</h6>
                <button class="btn btn-primary btn-sm" onclick="openEditModal()">문장 추가</button>
            </div>
            <div id="sentenceList">
                <div class="text-center py-5 text-muted">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>
</div>

<!-- Edit 모달 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-bold" id="modalTitle">편집</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editRow">
                <div class="mb-3">
                    <label class="small text-muted">영어 문장</label>
                    <input type="text" id="engText" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="small text-muted">한글 번역</label>
                    <input type="text" id="korText" class="form-control">
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="small text-muted">중요도</label>
                        <select id="importance" class="form-select">
                            <option value="1">★</option>
                            <option value="2">★★</option>
                            <option value="3">★★★</option>
                        </select>
                    </div>
                    <div class="col-6 mb-3 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="isMemorized">
                            <label class="form-check-label">암기</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer justify-content-between">
                <button type="button" class="btn btn-outline-danger btn-sm" id="btnDelete" onclick="saveData('delete')">삭제</button>
                <div>
                    <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveData('save')">저장</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://jsdelivr.net"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhtf2JNQYQPS6eZzo5JLKYydw5jTDWmDQ8PehFfd-xv8tv5AN4IMHiJzPJboTsZt9B/exec';
    let sentences = [];
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    // 1. 데이터 불러오기 (Read)
    async function fetchData() {
        showLoading(true);
        try {
            const response = await fetch(SCRIPT_URL);
            sentences = await response.json();
            renderList();
        } catch (e) {
            console.error("데이터 로드 실패", e);
            document.getElementById('sentenceList').innerHTML = "데이터를 불러오지 못했습니다.";
        }
        showLoading(false);
    }

    // 2. 리스트 렌더링
    function renderList() {
        const listDiv = document.getElementById('sentenceList');
        listDiv.innerHTML = '';
        sentences.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'sentence-item shadow-sm';
            div.onclick = () => openEditModal(index);
            
            const stars = '★'.repeat(item.importance || 1);
            const memorizedClass = item.isMemorized ? 'is-memorized' : '';

            div.innerHTML = `
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="fw-bold ${memorizedClass}">${item.eng}</div>
                        <div class="small text-secondary">${item.kor}</div>
                    </div>
                    <div class="importance-star small">${stars}</div>
                </div>
            `;
            listDiv.appendChild(div);
        });
    }

    // 3. 모달 열기
    function openEditModal(index = null) {
        document.getElementById('editRow').value = index === null ? "" : index;
        if (index !== null) {
            const data = sentences[index];
            document.getElementById('engText').value = data.eng;
            document.getElementById('korText').value = data.kor;
            document.getElementById('importance').value = data.importance;
            document.getElementById('isMemorized').checked = data.isMemorized;
            document.getElementById('btnDelete').style.visibility = "visible";
        } else {
            document.getElementById('engText').value = "";
            document.getElementById('korText').value = "";
            document.getElementById('importance').value = 1;
            document.getElementById('isMemorized').checked = false;
            document.getElementById('btnDelete').style.visibility = "hidden";
        }
        editModal.show();
    }

    // 4. 저장/삭제 (Create, Update, Delete)
    async function saveData(type) {
        const index = document.getElementById('editRow').value;
        const payload = {
            action: type === 'delete' ? 'delete' : (index === "" ? 'insert' : 'update'),
            index: index !== "" ? parseInt(index) : null,
            data: {
                eng: document.getElementById('engText').value,
                kor: document.getElementById('korText').value,
                importance: document.getElementById('importance').value,
                isMemorized: document.getElementById('isMemorized').checked
            }
        };

        showLoading(true);
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            editModal.hide();
            await fetchData(); // 최신 데이터 리로드
        } catch (e) {
            alert("처리 중 오류가 발생했습니다.");
        }
        showLoading(false);
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    // 첫 실행 시 로드
    window.onload = fetchData;
</script>
</body>
</html>
